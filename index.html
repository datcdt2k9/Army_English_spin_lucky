<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Army English Việt Yên - Vòng quay may mắn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
    :root{
        --green-1:#0f5b3a;
        --green-2:#0c6b43;
        --green-3:#1f8b5d;
        --green-4:#0a3e28;
        --gold-1:#ffd54f;
        --gold-2:#fff1a8;
        --gold-3:#c89010;
        --gold-4:#8d5b00;
        --text:#173222;
        --red:#d62828;
        --cream:#f7f6ef;
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; min-height:100%; }

    body{
        font-family:'Montserrat', Arial, sans-serif;
        color:#fff;
        background:#041b10;
        overflow-x:hidden;
    }

    .page{
        position:relative;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:18px;
        background:
            radial-gradient(circle at 50% 50%, rgba(83, 211, 128, .12), transparent 32%),
            radial-gradient(circle at 20% 15%, rgba(255,232,131,.18), transparent 16%),
            radial-gradient(circle at 85% 20%, rgba(255,232,131,.14), transparent 14%),
            linear-gradient(180deg,#0a4d2d 0%,#073720 100%);
    }

    .poster{
        position:relative;
        width:min(1400px, calc(100vw - 36px));
        aspect-ratio:1400 / 1000;
        background:url('./army 5.png') center/contain no-repeat;
        border-radius:24px;
        overflow:hidden;
        box-shadow:0 24px 60px rgba(0,0,0,.35);
    }

    .interactive-layer{
        position:absolute;
        inset:0;
        pointer-events:none;
    }

    .wheel-zone{
        position:absolute;
        left:57.2%;
        top:27.6%;
        width:36.5%;
        aspect-ratio:1 / 1.10;
        pointer-events:auto;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
    }

    .wheel-stage{
        position:relative;
        width:100%;
        aspect-ratio:1/1;
        display:grid;
        place-items:center;
        filter:drop-shadow(0 16px 30px rgba(0,0,0,.28));
    }

    .wheel-energy{
        position:absolute;
        inset:4%;
        border-radius:50%;
        background:
            radial-gradient(circle, rgba(100,255,160,.20) 0%, rgba(66,190,119,.12) 35%, rgba(0,0,0,0) 70%);
        filter:blur(6px);
        animation:pulseGlow 1.8s ease-in-out infinite;
        pointer-events:none;
    }

    .pointer-wrap{
        position:absolute;
        top:-2.8%;
        left:50%;
        transform:translateX(-50%);
        z-index:60;
        width:9.5%;
        height:18%;
        display:grid;
        place-items:start center;
        pointer-events:none;
    }

    .pointer-arrow{
        position:absolute;
        top:18%;
        left:50%;
        transform:translateX(-50%);
        width:0;
        height:0;
        border-left:24px solid transparent;
        border-right:24px solid transparent;
        border-top:68px solid #d62828;
        filter:drop-shadow(0 6px 8px rgba(0,0,0,.28));
        transition:transform .05s ease;
    }

    .pointer-wrap.tick .pointer-arrow{
        transform:translateX(-50%) translateY(4px) scaleY(.94);
    }

    .pointer-arrow::before{
        content:"";
        position:absolute;
        left:-30px;
        top:-74px;
        width:0;
        height:0;
        border-left:30px solid transparent;
        border-right:30px solid transparent;
        border-top:78px solid #ffd54f;
        z-index:-1;
    }

    .pointer-arrow::after{
        content:"";
        position:absolute;
        left:-19px;
        top:-67px;
        width:0;
        height:0;
        border-left:19px solid transparent;
        border-right:19px solid transparent;
        border-top:58px solid #9d1d1d;
    }

    .pointer-cap{
        position:absolute;
        top:0;
        left:50%;
        transform:translateX(-50%);
        width:42px;
        height:42px;
        border-radius:50%;
        background:radial-gradient(circle at 35% 35%, #fff8c9 0%, #ffe874 26%, #dca10c 65%, #8b5a00 100%);
        box-shadow:
            0 0 10px rgba(255,220,120,.75),
            0 4px 8px rgba(0,0,0,.22),
            inset 0 2px 4px rgba(255,255,255,.45);
        transition:transform .05s ease;
    }

    .pointer-wrap.tick .pointer-cap{
        transform:translateX(-50%) translateY(1px) scale(.98);
    }

    .pointer-cap::after{
        content:"";
        position:absolute;
        inset:10px;
        border-radius:50%;
        background:radial-gradient(circle at 35% 35%, #fffef2 0%, #ffd95c 45%, #b97800 100%);
    }

    .wheel-shell{
        position:relative;
        width:100%;
        aspect-ratio:1/1;
        padding:2.6%;
        border-radius:50%;
        background:
            radial-gradient(circle at 30% 25%, rgba(255,255,255,.8), rgba(255,255,255,0) 22%),
            linear-gradient(145deg, #fff5bb 0%, #ffd34e 26%, #ffbf23 42%, #c78200 74%, #6e4500 100%);
        box-shadow:
            0 0 0 3px rgba(255,231,138,.7),
            0 20px 40px rgba(0,0,0,.25),
            inset 0 4px 0 rgba(255,255,255,.55),
            inset 0 -10px 18px rgba(110,69,0,.32);
    }

    .wheel-shell::before{
        content:"";
        position:absolute;
        inset:1.8%;
        border-radius:50%;
        border:3px solid rgba(255,250,208,.9);
        pointer-events:none;
    }

    .wheel-shell::after{
        content:"";
        position:absolute;
        inset:5.8%;
        border-radius:50%;
        border:2px solid rgba(255,255,255,.2);
        pointer-events:none;
    }

    #wheel{
        width:100%;
        height:100%;
        display:block;
        border-radius:50%;
        background:transparent;
    }

    .stage-base{
        position:absolute;
        bottom:-7%;
        width:74%;
        height:14%;
        border-radius:50%;
        background:
            radial-gradient(circle at 50% 20%, rgba(195,255,213,.65), rgba(67,202,123,.25) 35%, rgba(0,0,0,0) 72%),
            radial-gradient(circle at 50% 50%, rgba(50,255,135,.32), rgba(0,0,0,0) 70%);
        filter:blur(2px);
        pointer-events:none;
    }

    .spin-btn-wrap{
        margin-top:-1%;
        width:62%;
        pointer-events:auto;
    }

    .spin-btn{
        width:100%;
        min-height:74px;
        border:none;
        border-radius:999px;
        cursor:pointer;
        position:relative;
        font-family:'Baloo 2', cursive;
        font-size:clamp(26px, 2.6vw, 34px);
        font-weight:800;
        letter-spacing:1px;
        color:#fff9dd;
        background:linear-gradient(180deg, #159e59 0%, #0f7d46 48%, #0a5c34 100%);
        box-shadow:
            0 0 0 4px rgba(255,223,120,.9),
            0 0 0 8px rgba(140,86,0,.58),
            0 14px 0 #0a472b,
            0 24px 34px rgba(0,0,0,.32),
            inset 0 3px 0 rgba(255,255,255,.35);
        transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
        text-transform:uppercase;
    }

    .spin-btn .arrow{ font-size:1.08em; margin-left:8px; }

    .spin-btn:hover{
        transform:translateY(-2px);
        filter:brightness(1.03);
    }

    .spin-btn:active{
        transform:translateY(7px);
        box-shadow:
            0 0 0 4px rgba(255,223,120,.9),
            0 0 0 8px rgba(140,86,0,.58),
            0 8px 0 #0a472b,
            0 14px 24px rgba(0,0,0,.26),
            inset 0 3px 0 rgba(255,255,255,.35);
    }

    .spin-btn[disabled]{
        opacity:.76;
        cursor:not-allowed;
    }

    .msg{
        margin-top:18px;
        min-height:26px;
        text-align:center;
        font-size:14px;
        font-weight:700;
        color:#fff4b9;
        text-shadow:0 2px 6px rgba(0,0,0,.35);
        pointer-events:none;
    }

    .overlay{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.48);
        backdrop-filter:blur(4px);
        z-index:100;
    }

    .modal{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:min(92vw, 860px);
        background:#f8f8f4;
        border-radius:14px;
        box-shadow:0 28px 60px rgba(0,0,0,.28);
        overflow:hidden;
        border:1px solid rgba(15,91,58,.08);
    }

    .modal-head{
        background:#eef2ea;
        color:#214432;
        font-weight:800;
        font-size:clamp(20px,2vw,32px);
        letter-spacing:2px;
        padding:24px 20px;
        text-transform:uppercase;
    }

    .modal-body{
        padding:20px 18px 18px;
    }

    .form-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:14px;
    }

    .field{
        width:100%;
        height:70px;
        border:2px solid #d9e2d8;
        border-radius:4px;
        padding:0 18px;
        font-size:clamp(16px,1.7vw,22px);
        color:#244131;
        background:#fff;
        outline:none;
        font-family:'Montserrat', Arial, sans-serif;
    }

    .field:focus{
        border-color:#1b7c4d;
        box-shadow:0 0 0 4px rgba(27,124,77,.10);
    }

    .actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px;
        margin-top:14px;
    }

    .btn{
        height:62px;
        border:none;
        border-radius:4px;
        color:#fff;
        font-family:'Baloo 2', cursive;
        font-size:clamp(20px,2vw,32px);
        font-weight:700;
        cursor:pointer;
        box-shadow:inset 0 2px 0 rgba(255,255,255,.2);
    }

    .btn-confirm{ background:linear-gradient(180deg,#1fb866,#12824a); }
    .btn-close{ background:linear-gradient(180deg,#ef2b2b,#cc1111); }

    .result-box{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.52);
        backdrop-filter:blur(4px);
        z-index:110;
    }

    .result-card{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:min(92vw, 560px);
        background:linear-gradient(180deg,#fffef8 0%, #fff8df 100%);
        color:var(--text);
        border-radius:24px;
        padding:32px 26px 26px;
        text-align:center;
        box-shadow:0 28px 60px rgba(0,0,0,.30);
        border:3px solid rgba(255,214,90,.45);
    }

    .result-icon{
        width:86px;
        height:86px;
        margin:0 auto 12px;
        border-radius:50%;
        display:grid;
        place-items:center;
        font-size:42px;
        background:radial-gradient(circle at 35% 35%, #fff8cf, #ffd552 60%, #c28600);
        box-shadow:0 10px 18px rgba(0,0,0,.16);
    }

    .result-title{
        margin:0;
        font-size:30px;
        font-weight:800;
        color:#175a39;
    }

    .result-reward{
        margin:16px 0 10px;
        font-size:34px;
        font-weight:800;
        color:#c89010;
        line-height:1.25;
    }

    .result-note{
        margin:0 0 18px;
        color:#4f6256;
        line-height:1.6;
        font-size:15px;
    }

    .result-btn{
        border:none;
        border-radius:999px;
        padding:14px 28px;
        font-size:18px;
        font-weight:800;
        color:#fff;
        background:linear-gradient(180deg,#1b7c4d,#0f5b3a);
        cursor:pointer;
        box-shadow:0 10px 18px rgba(0,0,0,.18);
    }

    @keyframes pulseGlow{
        0%,100%{ transform:scale(.98); opacity:.72; }
        50%{ transform:scale(1.03); opacity:1; }
    }

    @media (max-width: 1100px){
        .wheel-zone{ left:55.5%; top:27.2%; width:39%; }
        .spin-btn{ min-height:66px; }
    }

    @media (max-width: 860px){
        .page{ padding:0; }

        .poster{
            width:100vw;
            min-height:100vh;
            aspect-ratio:auto;
            background-position:center top;
            background-size:cover;
            border-radius:0;
        }

        .wheel-zone{
            left:50%;
            top:48%;
            transform:translateX(-50%);
            width:72%;
        }

        .form-grid,
        .actions{
            grid-template-columns:1fr;
        }

        .field{ height:60px; }

        .pointer-wrap{
            top:-3.2%;
            width:12%;
        }
    }
</style>
</head>
<body>
    <div class="page">
        <div class="poster">
            <div class="interactive-layer">
                <div class="wheel-zone">
                    <div class="wheel-stage">
                        <div class="wheel-energy"></div>

                        <div class="pointer-wrap" id="pointerWrap">
                            <div class="pointer-arrow"></div>
                            <div class="pointer-cap"></div>
                        </div>

                        <div class="wheel-shell">
                            <canvas id="wheel" width="700" height="700"></canvas>
                        </div>

                        <div class="stage-base"></div>
                    </div>

                    <div class="spin-btn-wrap">
                        <button id="spinBtn" class="spin-btn" type="button">QUAY NGAY <span class="arrow">&#187;</span></button>
                    </div>

                    <div id="statusMsg" class="msg"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="formOverlay" class="overlay">
        <div class="modal">
            <div class="modal-head">Mời bạn nhập thông tin</div>
            <div class="modal-body">
                <div class="form-grid">
                    <input id="phone" class="field" placeholder="SĐT/Phone number" />
                    <input id="name" class="field" placeholder="Họ và tên/Name" />
                    <input id="dob" class="field" placeholder="Ngày sinh" />
                    <input id="branch" class="field" placeholder="Chi nhánh" />
                </div>

                <div class="actions">
                    <button id="confirmBtn" class="btn btn-confirm" type="button">Xác nhận</button>
                    <button id="closeBtn" class="btn btn-close" type="button">Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resultOverlay" class="result-box">
        <div class="result-card">
            <div class="result-icon">🎁</div>
            <h2 class="result-title">Chúc mừng bạn đã nhận được</h2>
            <div id="resultReward" class="result-reward"></div>
            <p class="result-note">Army English Việt Yên sẽ liên hệ xác nhận thông tin và hướng dẫn nhận quà.</p>
            <button id="resultOkBtn" class="result-btn" type="button">Đồng ý</button>
        </div>
    </div>

<script>
(()=>{
const API_URL = "https://script.google.com/macros/s/AKfycbwT-UYI0Cd2DURAK_0VYWbRTDAMpzPnzaA7FlfML8jVH09Xx-oQVeXEFyZMIePge0v7/exec";

const _0xP = [
    { n: "Vở ô li Army", w: 5, c:"#118243", t:"#ffffff" },
    { n: "Set đồ dùng học tập", w: 25, c:"#f7f6ef", t:"#1b4d34" },
    { n: "Bút bi hình ngộ nghĩnh", w: 13, c:"#118243", t:"#ffffff" },
    { n: "Áo phông Army", w: 5, c:"#f7f6ef", t:"#1b4d34" },
    { n: "01 balo Army", w: 5, c:"#118243", t:"#ffffff" },
    { n: "1 tháng học 100% giáo viên Châu Âu", w: 20, c:"#f7f6ef", t:"#1b4d34" },
    { n: "Bút bi hình ngộ nghĩnh", w: 12, c:"#118243", t:"#ffffff" },
    { n: "Bút bi hình ngộ nghĩnh", w: 15, c:"#f7f6ef", t:"#1b4d34" }
];

const $ = id => document.getElementById(id);
const C = $("wheel");
const X = C.getContext("2d");
const B = $("spinBtn");
const M = $("statusMsg");
const FO = $("formOverlay");
const RO = $("resultOverlay");
const CB = $("confirmBtn");
const XB = $("closeBtn");
const OB = $("resultOkBtn");
const PH = $("phone");
const NM = $("name");
const DB = $("dob");
const BR = $("branch");
const RR = $("resultReward");
const PW = $("pointerWrap");

let A = 0;
let S = 0;
let L = 0;
let lastTickIndex = 0;
let audioCtx = null;
let lastAngleForSpeed = 0;
let lastAngleTime = 0;
let tickResetTimer = null;

const TOTAL_WEIGHT = _0xP.reduce((s, i) => s + i.w, 0);

const easeInCubic = t => t * t * t;
const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
const easeOutQuint = t => 1 - Math.pow(1 - t, 5);

const spinEasing = t => {
    if (t < 0.18) {
        return 0.10 * easeInCubic(t / 0.18);
    }
    if (t < 0.72) {
        return 0.10 + (0.72 - 0.10) * ((t - 0.18) / 0.54);
    }
    return 0.72 + (1 - 0.72) * easeOutQuint((t - 0.72) / 0.28);
};

const ensureAudioContext = () => {
    if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
    }
};

const playTickSound = (speed = 1) => {
    ensureAudioContext();
    if (!audioCtx) return;

    const now = audioCtx.currentTime;

    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    const filter1 = audioCtx.createBiquadFilter();

    filter1.type = "bandpass";
    filter1.frequency.value = 1750 + speed * 850;
    filter1.Q.value = 2.6;

    osc1.type = "square";
    osc1.frequency.setValueAtTime(920 + speed * 360, now);
    osc1.frequency.exponentialRampToValueAtTime(420 + speed * 120, now + 0.030);

    gain1.gain.setValueAtTime(0.0001, now);
gain1.gain.linearRampToValueAtTime(0.18 + speed * 0.045, now + 0.002);
gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.042);

osc1.connect(filter1);
filter1.connect(gain1);
gain1.connect(audioCtx.destination);

osc1.start(now);
osc1.stop(now + 0.045);

const osc2 = audioCtx.createOscillator();
const gain2 = audioCtx.createGain();
const filter2 = audioCtx.createBiquadFilter();

filter2.type = "highpass";
filter2.frequency.value = 1400;

osc2.type = "triangle";
osc2.frequency.setValueAtTime(1400 + speed * 420, now);
osc2.frequency.exponentialRampToValueAtTime(720, now + 0.018);

gain2.gain.setValueAtTime(0.0001, now);
gain2.gain.linearRampToValueAtTime(0.085, now + 0.001);
gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.024);

    osc2.connect(filter2);
    filter2.connect(gain2);
    gain2.connect(audioCtx.destination);

    osc2.start(now);
    osc2.stop(now + 0.028);
};
const playWinSound = () => {
    const audio = document.getElementById("winSound");
    if (!audio) return;

    audio.currentTime = 0;
    audio.volume = 1.0; // chỉnh âm lượng tại đây (0 → 1)
    audio.play().catch(() => {});
};

const triggerTick = (speed = 1) => {
    PW.classList.remove("tick");
    void PW.offsetWidth;
    PW.classList.add("tick");

    if (tickResetTimer) clearTimeout(tickResetTimer);
    tickResetTimer = setTimeout(() => PW.classList.remove("tick"), 55);

    playTickSound(speed);
};

const drawWrappedText = (g, text, x, y, maxWidth, lineHeight) => {
    const words = text.split(" ");
    let line = "";
    const lines = [];

    for (let i = 0; i < words.length; i++) {
        const testLine = line + words[i] + " ";
        if (g.measureText(testLine).width > maxWidth && i > 0) {
            lines.push(line.trim());
            line = words[i] + " ";
        } else {
            line = testLine;
        }
    }

    lines.push(line.trim());
    const startY = y - ((lines.length - 1) * lineHeight) / 2;
    lines.forEach((row, i) => g.fillText(row, x, startY + i * lineHeight));
};

const drawCenterCap = (cx, cy) => {
    const outer = X.createRadialGradient(cx - 20, cy - 20, 8, cx, cy, 72);
    outer.addColorStop(0, "#fff8c9");
    outer.addColorStop(.38, "#ffd54f");
    outer.addColorStop(.7, "#d18c0a");
    outer.addColorStop(1, "#7c4e00");

    X.beginPath();
    X.arc(cx, cy, 58, 0, Math.PI * 2);
    X.fillStyle = outer;
    X.fill();
    X.lineWidth = 5;
    X.strokeStyle = "rgba(119,75,0,.6)";
    X.stroke();

    const inner = X.createRadialGradient(cx - 8, cy - 8, 3, cx, cy, 26);
    inner.addColorStop(0, "#fffef2");
    inner.addColorStop(.5, "#f8cd46");
    inner.addColorStop(1, "#9c6200");

    X.beginPath();
    X.arc(cx, cy, 18, 0, Math.PI * 2);
    X.fillStyle = inner;
    X.fill();
};

const drawBulbs = (cx, cy, r, count, phase) => {
    const bulbColors = [
        { on: "#ff3b30", mid: "#ff7b72", off: "#6e1b16" }, // Red
        { on: "#34c759", mid: "#7dff9b", off: "#1d5e2f" }, // Green
        { on: "#007aff", mid: "#66b3ff", off: "#123f73" }, // Blue
        { on: "#ffd60a", mid: "#ffe56b", off: "#7d6700" }  // Yellow
    ];

    for (let i = 0; i < count; i++) {
        const angle = ((Math.PI * 2) / count) * i - Math.PI / 2;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;

        const colorSet = bulbColors[i % bulbColors.length];

        const d = (i - phase + count) % count;

        /* size gốc */
        let size = 8;
        let shadow = 0;
        let c1 = "#ffffff";
        let c2 = colorSet.off;
        let c3 = "#2a2a2a";

      /* HEAD sáng nhất */
if (d === 0) {
    size = 14;
    shadow = 26;
    c2 = colorSet.on;
    c3 = colorSet.mid;
}
/* đuôi 1 */
else if (d === 1) {
    size = 12.5;
    shadow = 20;
    c2 = colorSet.mid;
    c3 = colorSet.off;
}
/* đuôi 2 */
else if (d === 2) {
    size = 11;
    shadow = 14;
    c2 = colorSet.mid;
    c3 = colorSet.off;
}
/* đuôi 3 */
else if (d === 3) {
    size = 10;
    shadow = 8;
    c1 = "rgba(255,255,255,.75)";
    c2 = colorSet.off;
    c3 = "#252525";
}
/* đuôi 4 (mới thêm) */
else if (d === 4) {
    size = 9;
    shadow = 3;
    c1 = "rgba(255,255,255,.55)";
    c2 = colorSet.off;
    c3 = "#1f1f1f";
}
/* còn lại */
else {
    size = 8;
}
        const glow = X.createRadialGradient(x - 2, y - 2, 1, x, y, size + 5);
        glow.addColorStop(0, c1);
        glow.addColorStop(0.25, c2);
        glow.addColorStop(1, c3);

        X.beginPath();
        X.arc(x, y, size, 0, Math.PI * 2);
        X.fillStyle = glow;
        X.shadowColor = shadow ? c2 : "transparent";
        X.shadowBlur = shadow;
        X.fill();
        X.shadowBlur = 0;
    }
};

const drawWheel = (deg = 0) => {
    const w = C.width;
    const h = C.height;
    const cx = w / 2;
    const cy = h / 2;
    const r = 312;
    const arc = (Math.PI * 2) / _0xP.length;

    X.clearRect(0, 0, w, h);

    const ring = X.createRadialGradient(cx, cy, 140, cx, cy, 320);
    ring.addColorStop(0, "rgba(5,80,40,0)");
    ring.addColorStop(1, "rgba(255,255,255,.10)");
    X.beginPath();
    X.arc(cx, cy, r + 8, 0, Math.PI * 2);
    X.fillStyle = ring;
    X.fill();

    X.save();
    X.translate(cx, cy);
    X.rotate(deg * Math.PI / 180);

    for (let i = 0; i < _0xP.length; i++) {
        const st = i * arc - Math.PI / 2;
        const en = st + arc;
        const item = _0xP[i];

        X.beginPath();
        X.moveTo(0, 0);
        X.arc(0, 0, r, st, en);
        X.closePath();
        X.fillStyle = item.c;
        X.fill();

        X.lineWidth = 3;
        X.strokeStyle = "rgba(255,255,255,0.92)";
        X.stroke();

        const wg = X.createLinearGradient(0, -r, 0, r);
        wg.addColorStop(0, "rgba(255,255,255,.14)");
        wg.addColorStop(.5, "rgba(255,255,255,0)");
        wg.addColorStop(1, "rgba(0,0,0,.08)");
        X.fillStyle = wg;
        X.fill();

        X.save();
        X.rotate(st + arc / 2);
        X.translate(r * .62, 0);
        X.rotate(Math.PI / 2);
        X.textAlign = "center";
        X.textBaseline = "middle";
        X.fillStyle = item.t;
        X.font = "800 22px Montserrat";
        drawWrappedText(X, item.n, 0, 0, 132, 25);
        X.restore();
    }

    X.restore();

    X.beginPath();
    X.arc(cx, cy, r, 0, Math.PI * 2);
    X.lineWidth = 8;
    X.strokeStyle = "rgba(255,255,255,.18)";
    X.stroke();

    drawBulbs(cx, cy, 334, 24, L);
    drawCenterCap(cx, cy);
};

const pickRewardIndex = () => {
    let z = Math.random() * TOTAL_WEIGHT;
    for (let i = 0; i < _0xP.length; i++) {
        z -= _0xP[i].w;
        if (z < 0) return i;
    }
    return _0xP.length - 1;
};

const getTickIndex = (deg) => {
    const sector = 360 / _0xP.length;
    return Math.floor((((deg % 360) + 360) % 360) / sector);
};

const handleTickByAngle = (deg, nowMs) => {
    const idx = getTickIndex(deg);

    if (!lastAngleTime) {
        lastAngleTime = nowMs;
        lastAngleForSpeed = deg;
    }

    const dt = Math.max(1, nowMs - lastAngleTime);
    const da = Math.abs(deg - lastAngleForSpeed);
    const degPerMs = da / dt;

    const speed = Math.max(0.6, Math.min(2.2, degPerMs * 18));

    if (idx !== lastTickIndex) {
        lastTickIndex = idx;
        triggerTick(speed);
    }

    lastAngleForSpeed = deg;
    lastAngleTime = nowMs;
};

const saveResult = (reward) => {
    return fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
            phone: PH.value.trim(),
            name: NM.value.trim(),
            dob: DB.value.trim(),
            branch: BR.value.trim(),
            reward: reward
        })
    })
    .then(res => res.text())
    .then(() => {
        M.textContent = "Đã lưu kết quả thành công.";
        return true;
    })
    .catch(() => {
        M.textContent = "Quay thành công nhưng lưu dữ liệu chưa thành công.";
        return false;
    });
};

const openForm = () => {
    if (S) return;
    FO.style.display = "block";
};

const closeForm = () => FO.style.display = "none";
const closeResult = () => RO.style.display = "none";

const validateForm = () => {
    if (!PH.value.trim() || !NM.value.trim()) {
        M.textContent = "Vui lòng nhập đầy đủ SĐT và họ tên.";
        return false;
    }
    M.textContent = "";
    return true;
};

const spinWheel = () => {
    if (S || !validateForm()) return;

    ensureAudioContext();
    closeForm();
    S = 1;
    B.disabled = true;
    M.textContent = "Hệ thống đang quay thưởng...";

    const i = pickRewardIndex();
    const sector = 360 / _0xP.length;
    const target = 360 - (i * sector + sector / 2);

    const extraTurns = 8 + Math.floor(Math.random() * 2);
    const extra = extraTurns * 360;

    const cur = ((A % 360) + 360) % 360;
    const delta = ((target - cur) + 360) % 360;

    const overshoot = 8 + Math.random() * 6;
    const finalMain = A + extra + delta + overshoot;
    const finalSnap = A + extra + delta;

    const durMain = 5200 + Math.random() * 500;
    const durSnap = 380;

    const start = A;
    const changeMain = finalMain - start;
    const t0 = performance.now();

    lastTickIndex = getTickIndex(A);
    lastAngleForSpeed = A;
    lastAngleTime = performance.now();

    const animateMain = now => {
        const elapsed = now - t0;
        const p = Math.min(elapsed / durMain, 1);
        const k = spinEasing(p);

        A = start + changeMain * k;
        drawWheel(A);
        handleTickByAngle(A, now);

        if (p < 1) {
            requestAnimationFrame(animateMain);
        } else {
            const snapStart = A;
            const snapChange = finalSnap - snapStart;
            const t1 = performance.now();

            const animateSnap = now2 => {
                const elapsed2 = now2 - t1;
                const p2 = Math.min(elapsed2 / durSnap, 1);
                const k2 = easeOutCubic(p2);

                A = snapStart + snapChange * k2;
                drawWheel(A);
                handleTickByAngle(A, now2);

                if (p2 < 1) {
                    requestAnimationFrame(animateSnap);
                } else {
                    A = finalSnap;
                    drawWheel(A);
                    handleTickByAngle(A, performance.now());

                    S = 0;
                    B.disabled = false;

                    const reward = _0xP[i].n;
RR.textContent = reward;
playWinSound();
RO.style.display = "block";

                    saveResult(reward).then(ok => {
                        M.textContent = ok
                            ? "Quay và lưu dữ liệu thành công."
                            : "Quay thành công nhưng lưu dữ liệu chưa thành công.";
                    });
                }
            };

            requestAnimationFrame(animateSnap);
        }
    };

    requestAnimationFrame(animateMain);
};

setInterval(() => {
    L = (L + 1) % 24;
    if (!S) drawWheel(A);
}, 40);

B.addEventListener("click", openForm);
CB.addEventListener("click", spinWheel);
XB.addEventListener("click", closeForm);
OB.addEventListener("click", closeResult);

FO.addEventListener("click", e => {
    if (e.target === FO) closeForm();
});

RO.addEventListener("click", e => {
    if (e.target === RO) closeResult();
});

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e => {
    const k = e.key?.toLowerCase();
    if (
        k === "f12" ||
        (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(k)) ||
        (e.ctrlKey && ["u","s"].includes(k))
    ) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
}, true);

let devtoolsOpened = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
setInterval(() => {
    const nowOpened = window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160;
    if (nowOpened && !devtoolsOpened) {
        document.body.innerHTML = "";
        document.body.style.background = "#041b10";
    }
    devtoolsOpened = nowOpened;
}, 1000);

drawWheel(0);
})();
</script>
